<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Projexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: #14b8a6;
            --success: #059669;
            --error: #ef4444;
            --text-main: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg-gradient);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%; z-index: -1;
            filter: blur(80px); opacity: 0.5;
        }
        body::before { top: -100px; left: -100px; width: 400px; height: 400px; background: #14b8a6; }
        body::after { bottom: -100px; right: -100px; width: 300px; height: 300px; background: #34d399; }
        
        .login-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 400px; box-shadow: var(--glass-shadow);
            text-align: center; transform: translateY(20px); opacity: 0; animation: slideUp 0.6s ease forwards;
        }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
        
        .icon { width: 64px; height: 64px; background: white; border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: var(--primary); }
        h1 { color: var(--text-main); font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; margin-left: 4px;}
        input {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255,255,255,0.8); border: 1px solid rgba(203,213,225,0.8);
            font-size: 15px; outline: none; transition: all 0.3s;
        }
        input:focus { background: white; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        
        button {
            width: 100%; padding: 14px; border-radius: 12px; background: var(--primary); color: white;
            font-size: 16px; font-weight: 600; border: none; cursor: pointer; transition: all 0.3s;
            margin-top: 10px; box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4); }
        
        .alert {
            display: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500;
            margin-top: 20px; background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .alert.active { display: block; animation: shake 0.4s ease; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; border-radius: 16px; margin: 0 16px; }
            h1 { font-size: 22px; }
            p { font-size: 13px; margin-bottom: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <h1>Staff Portal</h1>
        <p>Enter administrative password to manage projects</p>
        
        <form id="loginForm">
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Department</label>
                <select id="department" required style="width: 100%; padding: 14px 18px; border-radius: 12px; background: rgba(255,255,255,0.8); border: 1px solid rgba(203,213,225,0.8); font-size: 15px; outline: none; transition: all 0.3s; cursor: pointer;">
                    <option value="" disabled selected>Select Department</option>
                    <option value="CSE">Computer Science (CSE)</option>
                    <option value="IT">Information Technology (IT)</option>
                    <option value="ECE">Electronics & Communication (ECE)</option>
                    <option value="EEE">Electrical & Electronics (EEE)</option>
                    <option value="MECH">Mechanical Engineering (MECH)</option>
                    <option value="CIVIL">Civil Engineering (CIVIL)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Department Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Access Dashboard</button>
            <div class="alert" id="errorAlert">Invalid Credentials! Access Denied.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const dept = document.getElementById('department').value;
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('errorAlert');
            
            // Department-specific password: lowercase dept name + @123
            const expectedPass = dept.toLowerCase() + '@123';
            if(pass === expectedPass) {
                sessionStorage.setItem('adminAuth', 'true');
                sessionStorage.setItem('adminDept', dept);
                window.location.href = 'AdminDashboard.html';
            } else {
                alertBox.classList.remove('active');
                void alertBox.offsetWidth; // trigger reflow
                alertBox.classList.add('active');
            }
        });
    </script>
</body>
</html>
